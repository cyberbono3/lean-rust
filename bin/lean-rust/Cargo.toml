[package]
name          = "lean-rust"
version.workspace      = true
edition.workspace      = true
rust-version.workspace = true
license.workspace      = true
repository.workspace   = true
description   = "`lean-rust` binary entry-point: wires CLI + genesis + keygen into the runtime composition root."

[[bin]]
name          = "lean-rust"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
lean-cli           = { path = "../../crates/lean-cli" }
node               = { path = "../../crates/node" }
lean-core          = { path = "../../crates/runtime/core" }
lean-duties        = { path = "../../crates/runtime/duties" }
lean-p2p-host      = { path = "../../crates/runtime/p2p" }
lean-observability = { path = "../../crates/observability" }
config             = { path = "../../crates/config" }
anyhow             = { workspace = true }
clap               = { workspace = true }
tokio              = { workspace = true }
tracing            = { workspace = true }

[dev-dependencies]
fixtures = { path = "../../crates/fixtures" }
tempfile = { workspace = true }
ssz      = { path = "../../crates/ssz" }
