name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_BACKTRACE: short

jobs:
  msrv-consistency:
    name: msrv consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check every toolchain source declares the same MSRV
        run: scripts/check-msrv-consistency.sh
      - name: check the guard itself catches drift
        run: bash scripts/tests/test-check-msrv-consistency.sh

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.87 (MSRV)
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.87 (MSRV)
        uses: dtolnay/rust-toolchain@1.87.0
        with:
          components: clippy
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust 1.87 (MSRV)
        uses: dtolnay/rust-toolchain@1.87.0
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace
