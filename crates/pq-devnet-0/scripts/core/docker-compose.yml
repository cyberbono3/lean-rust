x-volumes:
  config: &config-volume ./config:/config:ro
  genesis: &genesis-volume ./genesis:/genesis:ro

services:
  node0:
    image: ${REAM_IMAGE:-ethpandaops/ream:master-0bceaee}
    container_name: ream-node0
    command:
      - --data-dir
      - /data
      - lean_node
      - --network
      - /genesis/config.yaml
      - --validator-registry-path
      - /genesis/validators.yaml
      - --node-id
      - ream_0
      - --private-key-path
      - /config/keys/node0.key
      - --socket-address
      - 172.20.0.10
      - --socket-port
      - "9000"
      - --http-address
      - 0.0.0.0
      - --http-port
      - "5052"
      - --http-allow-origin
      - --bootnodes
      - /genesis/nodes.yaml
      - --metrics
      - --metrics-address
      - 0.0.0.0
      - --metrics-port
      - "8080"
    ports:
      - "9000:9000/udp"
      - "5052:5052"
      - "8080:8080"
    volumes:
      - *config-volume
      - *genesis-volume
      - node0-data:/data
    networks:
      pq-devnet:
        ipv4_address: 172.20.0.10
    restart: unless-stopped

  node1:
    image: ${LEAN_RUST_IMAGE:-lean-rust:local}
    container_name: lean-rust-node1
    pull_policy: never
    command:
      - --data-dir=/data
      - --network=/genesis/config.yaml
      - --genesis-state=/genesis/genesis.ssz
      - --validator-registry-path=/genesis/validators.yaml
      - --node-id=leanrust_1
      - --private-key-path=/config/keys/node1.key
      - --bootnodes=/genesis/bootnodes.rust.yaml
      - --devnet-listen-addresses=/ip4/0.0.0.0/udp/9000/quic-v1
      - --http-address=0.0.0.0
      - --http-port=5052
      - --http-allow-origin=*
      - --metrics
      - --metrics-address=0.0.0.0
      - --metrics-port=8080
      - --debug
      - --log.dir.path=/var/lean-logs
      - --log.dir.prefix=lean-rust
    ports:
      - "9001:9000/udp"
      - "5053:5052"
      - "8081:8080"
    volumes:
      - *config-volume
      - *genesis-volume
      - ./logs:/var/lean-logs
      - node1-data:/data
    networks:
      pq-devnet:
        ipv4_address: 172.20.0.11
    depends_on:
      - node0
    restart: unless-stopped

networks:
  pq-devnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

volumes:
  node0-data:
  node1-data:
